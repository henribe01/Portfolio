services:
  - type: web
    name: portfolio
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT "portfolio:create_app()"
    preDeployCommand: flask db upgrade
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: portfolio:create_app
      - key: PYTHON_VERSION
        value: 3.12.7

databases:
  - name: portfolio-db
    plan: free
